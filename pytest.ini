[pytest]
# Restrict collection to tests/ -- without this, pytest's default rootdir
# walk scans everything (fixtures/, output/, output_validation/, .venv/,
# _test_scratch/, etc.), which is both slower and -- on this project's own
# dev machine -- has hit a Windows filesystem-minifilter interaction where
# Path.lstat() raises FileNotFoundError while walking a directory that
# genuinely exists (the same stat-vs-scandir discrepancy documented in
# tools/dependency_validator/report.py and tests/test_dependency_coverage_validator.py).
testpaths = tests
